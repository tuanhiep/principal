baseURL: "https://tuanhiep.github.io/principal"
title: "Tuan Hiep TRAN — The Principal Craft"
languageCode: "en-us"
theme: "PaperMod"
pagination:
  pagerSize: 10
enableRobotsTXT: true
enableGitInfo: true

# 1. THÊM ĐOẠN NÀY ĐỂ KÍCH HOẠT SERIES
taxonomies:
  category: categories
  tag: tags
  series: series

frontmatter:
  date:
    - date
    - publishDate
    - :git   # fallback → dùng ngày commit đầu tiên
  lastmod:
    - lastmod
    - date
    - publishDate
    - :git        # <- ưu tiên ngày commit

params:
  defaultTheme: auto
  showReadingTime: true
  showToc: true
  tocOpen: true
  author: "Hiep"
  homeInfoParams:
    Title: "The Principal Craft"
    Content: >
      Notes from real-world Principal Engineering and Software Architecture.
  showLastMod: true              # <- bật hiển thị ngày update
  # lastModFormat: "Jan 2, 2006" # (tuỳ chọn format ngày)
  mermaid:
    enable: true
    theme: "default" # Các lựa chọn: default, dark, neutral, forest

menu:
  main:
    - name: Posts
      url: /posts/
      weight: 1
    # 2. THÊM MENU NÀY VÀO TRANG CHỦ
    - name: Series
      url: /series/
      weight: 2
    - name: Tags
      url: /tags/
      weight: 3

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - - $$
              - $$
            - - \[
              - \]
          inline:
            - - $
              - $
            - - \(
              - \)
